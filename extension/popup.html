<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>添加到快捷导航</title>
<style>
:root{
  --bg:#f8fafc;--bg2:#fff;--bg3:#f1f5f9;
  --glass:rgba(255,255,255,.72);--glass-h:rgba(255,255,255,.88);--glass-b:rgba(255,255,255,.5);
  --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;
  --accent:#6366f1;--accent-h:#4f46e5;--accent-l:rgba(99,102,241,.1);--accent-g:rgba(99,102,241,.25);
  --divider:rgba(0,0,0,.06);--shd:rgba(15,23,42,.06);
  --ff:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  --t-fast:150ms cubic-bezier(.4,0,.2,1);--t-norm:250ms cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#0c0a1d;--bg2:#1a1730;--bg3:#151228;
  --glass:rgba(20,18,42,.72);--glass-h:rgba(30,27,55,.88);--glass-b:rgba(255,255,255,.08);
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;
  --accent:#818cf8;--accent-h:#a5b4fc;--accent-l:rgba(129,140,248,.12);--accent-g:rgba(129,140,248,.3);
  --divider:rgba(255,255,255,.06);--shd:rgba(0,0,0,.3);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--ff);
  background:var(--bg);
  color:var(--tx);
  width:320px;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* 顶部页面卡片 */
.page-card{
  padding:.75rem 1rem;
  border-bottom:1px solid var(--divider);
  display:flex;align-items:center;gap:.625rem;
  background:var(--bg2);
}
.page-favicon{
  width:28px;height:28px;
  border-radius:.5rem;
  background:var(--bg3);
  flex-shrink:0;
  background-size:cover;background-position:center;
  box-shadow:0 1px 2px var(--shd);
}
.page-info{flex:1;min-width:0}
.page-title{
  font-size:.8125rem;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--tx);line-height:1.3;
}
.page-url{
  font-size:.6875rem;color:var(--tx3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* 主体区域 */
.body{
  padding:.75rem 1rem 0;
}

/* 重复提示 */
.exists{
  font-size:.6875rem;
  color:#f59e0b;
  background:rgba(245,158,11,.08);
  padding:.375rem .625rem;
  border-radius:.5rem;
  margin-bottom:.75rem;
  display:flex;align-items:center;gap:.375rem;
  line-height:1.4;
}

/* 图标行 */
.icon-row{
  display:flex;align-items:center;gap:.75rem;
  margin-bottom:.75rem;
}
.icon-preview{
  width:38px;height:38px;
  border-radius:.625rem;
  display:flex;align-items:center;justify-content:center;
  font-size:1.125rem;font-weight:700;color:#fff;
  background:var(--accent);
  flex-shrink:0;
  background-size:cover;background-position:center;
  box-shadow:0 2px 6px var(--shd);
  transition:transform var(--t-fast);
}
.icon-preview.has-img{font-size:0}
.icon-right{flex:1}
.icon-label{font-size:.6875rem;color:var(--tx3);margin-bottom:.3rem}
.icon-actions{display:flex;gap:.25rem}
.icon-btn{
  padding:.2rem .5rem;
  border:1px solid var(--glass-b);
  border-radius:.375rem;
  background:var(--bg3);
  color:var(--tx2);
  font-size:.6875rem;font-family:var(--ff);
  cursor:pointer;transition:all var(--t-fast);
}
.icon-btn:hover{background:var(--accent-l);color:var(--accent);border-color:var(--accent-g)}
.icon-btn.on{background:var(--accent-l);color:var(--accent);border-color:var(--accent-g)}

/* 表单 */
.fg{margin-bottom:.625rem}
.fl{display:block;font-size:.6875rem;font-weight:500;color:var(--tx2);margin-bottom:.2rem}
.fi{
  width:100%;padding:.4375rem .625rem;
  border:1px solid var(--glass-b);
  border-radius:.5rem;
  background:var(--bg3);
  font-size:.8125rem;font-family:var(--ff);color:var(--tx);
  outline:0;transition:all var(--t-fast);
}
.fi:focus{border-color:var(--accent-g);box-shadow:0 0 0 2px var(--accent-l)}
.fi::placeholder{color:var(--tx3)}

/* 颜色选择 */
.colors{display:flex;gap:.375rem;flex-wrap:wrap}
.co{width:22px;height:22px;border-radius:9999px;border:2px solid transparent;cursor:pointer;transition:all var(--t-fast)}
.co:hover{transform:scale(1.15)}
.co.sel{border-color:var(--tx);box-shadow:0 0 0 2px var(--bg2),0 0 0 4px var(--tx)}

/* 文件夹选择 */
.targets{display:flex;flex-wrap:wrap;gap:.25rem}
.tg{
  padding:.2rem .5rem;
  border:1px solid var(--glass-b);
  border-radius:9999px;
  background:var(--bg3);
  color:var(--tx2);
  font-size:.6875rem;font-family:var(--ff);
  cursor:pointer;transition:all var(--t-fast);
}
.tg:hover{border-color:var(--accent-g)}
.tg.sel{background:var(--accent-l);color:var(--accent);border-color:var(--accent-g)}

/* 底部按钮 */
.foot{
  display:flex;gap:.375rem;
  padding:.625rem 1rem .875rem;
}
.btn{
  flex:1;padding:.4375rem;
  border:none;border-radius:.5rem;
  font-size:.8125rem;font-weight:500;
  font-family:var(--ff);cursor:pointer;
  transition:all var(--t-fast);
}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-g{background:var(--bg3);color:var(--tx2)}
.btn-g:hover{background:var(--divider)}

/* Toast */
.toast{
  position:fixed;bottom:.5rem;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--glass);backdrop-filter:blur(16px);
  border:1px solid var(--glass-b);border-radius:.5rem;
  padding:.375rem .75rem;font-size:.75rem;color:var(--tx);
  box-shadow:0 4px 12px var(--shd);
  opacity:0;transition:all var(--t-norm);
  z-index:10;white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(prefers-color-scheme:dark){
  body{background:var(--bg)}
}
</style>
</head>
<body>

<!-- 顶部：当前页面信息 -->
<div class="page-card">
  <img class="page-favicon" id="favicon" src="" alt="">
  <div class="page-info">
    <div class="page-title" id="pTitle">GitHub: Where the world builds software</div>
    <div class="page-url" id="pUrl">github.com</div>
  </div>
</div>

<div class="body">

  <!-- 重复提示 -->
  <div class="exists" id="existsHint">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12.01" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span>该网站已在快捷导航中</span>
  </div>

  <!-- 图标预览 -->
  <div class="icon-row">
    <div class="icon-preview" id="iconPreview" style="background-image:url(https://www.google.com/s2/favicons?domain=github.com&sz=64);background-color:#24292e" class="has-img"></div>
    <div class="icon-right">
      <div class="icon-label">图标预览</div>
      <div class="icon-actions">
        <button class="icon-btn on" id="autoBtn">自动获取</button>
        <button class="icon-btn" id="customBtn">自定义</button>
      </div>
    </div>
  </div>

  <!-- 自定义图标输入（默认隐藏） -->
  <div class="fg" id="customFg" style="display:none">
    <input class="fi" id="customIcon" placeholder="图标（文字或 Emoji）" maxlength="2">
  </div>

  <!-- 名称 -->
  <div class="fg">
    <label class="fl">名称</label>
    <input class="fi" id="siteName" value="GitHub">
  </div>

  <!-- 网址 -->
  <div class="fg">
    <label class="fl">网址</label>
    <input class="fi" id="siteUrl" value="https://github.com">
  </div>

  <!-- 颜色 -->
  <div class="fg">
    <label class="fl">图标颜色</label>
    <div class="colors" id="colors"></div>
  </div>

  <!-- 目标位置 -->
  <div class="fg">
    <label class="fl">添加到</label>
    <div class="targets" id="targets"></div>
  </div>
</div>

<!-- 底部按钮 -->
<div class="foot">
  <button class="btn btn-g" onclick="window.close?.()">取消</button>
  <button class="btn btn-p" id="addBtn">添加</button>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS=['#6366f1','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#8b5cf6','#06b6d4','#f97316','#24292e'];
let selColor=COLORS[1]; // 默认紫色
let iconMode='auto';
let customVal='';

function getFaviconUrl(url){
  try{const u=new URL(url);return`https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`}catch{return ''}
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000);
}

/* 颜色渲染 */
document.getElementById('colors').innerHTML=COLORS.map(c=>`<div class="co${c===selColor?' sel':''}" style="background:${c}" data-c="${c}"></div>`).join('');
document.querySelectorAll('#colors .co').forEach(el=>el.addEventListener('click',()=>{
  selColor=el.dataset.c;
  document.querySelectorAll('#colors .co').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  updatePreview();
}));

/* 图标预览 */
function updatePreview(){
  const box=document.getElementById('iconPreview');
  const name=document.getElementById('siteName').value.trim();
  const url=document.getElementById('siteUrl').value.trim();
  box.style.background=selColor;
  if(iconMode==='custom'&&customVal){
    box.innerHTML=customVal;box.style.backgroundImage='';box.className='icon-preview';
  }else{
    const imgUrl=getFaviconUrl(url);
    if(imgUrl){
      box.style.backgroundImage=`url(${imgUrl})`;box.innerHTML='';box.className='icon-preview has-img';
    }else{
      box.style.backgroundImage='';box.innerHTML=name?name[0].toUpperCase():'A';box.className='icon-preview';
    }
  }
}

/* 图标模式切换 */
document.getElementById('autoBtn').addEventListener('click',()=>{
  iconMode='auto';customVal='';
  document.getElementById('autoBtn').classList.add('on');
  document.getElementById('customBtn').classList.remove('on');
  document.getElementById('customFg').style.display='none';
  updatePreview();
});
document.getElementById('customBtn').addEventListener('click',()=>{
  iconMode='custom';
  document.getElementById('customBtn').classList.add('on');
  document.getElementById('autoBtn').classList.remove('on');
  document.getElementById('customFg').style.display='block';
  document.getElementById('customIcon').focus();
});
document.getElementById('customIcon').addEventListener('input',e=>{customVal=e.target.value;updatePreview()});
document.getElementById('siteName').addEventListener('input',updatePreview);
document.getElementById('siteUrl').addEventListener('input',updatePreview);

/* 目标文件夹渲染 */
const folders=['快捷导航','开发工具','设计资源','学习资料'];
let target=0;
document.getElementById('targets').innerHTML=folders.map((f,i)=>`<div class="tg${i===target?' sel':''}" data-i="${i}">${f}</div>`).join('');
document.querySelectorAll('#targets .tg').forEach(el=>el.addEventListener('click',()=>{
  document.querySelectorAll('#targets .tg').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');target=+el.dataset.i;
}));

/* 添加按钮 */
document.getElementById('addBtn').addEventListener('click',()=>{
  showToast('已添加到 '+folders[target]);
});
document.getElementById('siteUrl').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addBtn').click()});

/* 设置 favicon 示例 */
document.getElementById('favicon').src=getFaviconUrl('https://github.com');
</script>
</body>
</html>
