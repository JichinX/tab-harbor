<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<p>Done</p>
<script>
const svg = `<svg id="icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B7DE9"/>
      <stop offset="100%" stop-color="#1A5FBF"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg-grad)"/>
  <rect x="1" y="1" width="126" height="62" rx="27" fill="#ffffff" opacity="0.06"/>
  <path d="M-4 86 C16 76, 36 96, 64 84 C92 72, 112 94, 132 84 L132 132 L-4 132 Z" fill="url(#wave1)"/>
  <path d="M-4 96 C20 88, 44 104, 68 94 C92 84, 114 100, 132 94 L132 132 L-4 132 Z" fill="url(#wave2)"/>
  <rect x="58" y="24" width="56" height="38" rx="9" fill="#ffffff" opacity="0.18"/>
  <rect x="66" y="34" width="22" height="4" rx="2" fill="#1A5FBF" opacity="0.4"/>
  <rect x="38" y="32" width="56" height="40" rx="9" fill="#ffffff" opacity="0.32"/>
  <rect x="46" y="44" width="26" height="4" rx="2" fill="#1A5FBF" opacity="0.45"/>
  <rect x="16" y="42" width="66" height="44" rx="10" fill="#ffffff"/>
  <rect x="26" y="54" width="30" height="5" rx="2.5" fill="#2B7DE9" opacity="0.55"/>
  <rect x="26" y="64" width="18" height="5" rx="2.5" fill="#2B7DE9" opacity="0.3"/>
  <circle cx="68" cy="64" r="6" fill="#2B7DE9" opacity="0.2"/>
</svg>`;

function render(canvas) {
  return new Promise(resolve => {
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); resolve(); };
    img.onerror = () => resolve();
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  });
}

(async () => {
  for (const size of [16, 48, 128]) {
    const c = document.getElementById('c' + size);
    await render(c);
    // Store base64 for extraction
    window['png' + size] = c.toDataURL('image/png');
  }
  document.title = 'READY';
})();
</script>
</body>
</html>
